<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>המשמרות שלי – babysitter</title>
  
  <link rel="stylesheet" href="style/common.css">
  <link rel="stylesheet" href="style/upcoming-shifts.css">
</head>
<body>

  <nav class="navbar">
    <a class="logo" href="index.html">🍼 babysitter</a>
    <div class="nav-links">
      <a class="nav-link" href="index.html">🏠 בית</a>
      <a class="nav-link" href="family-search.html">🔍 חיפוש</a>
      <a class="nav-link active" href="upcoming-shifts.html">📅 המשמרות שלי</a>
      <a class="nav-link" href="active-shift.html">⏱️ משמרת פעילה</a>
      <a class="nav-link" href="shift-summary.html">💳 סיכום משמרת</a>
    </div>
    <div class="nav-right">
      <a class="nav-icon" href="register.html"><span>👤</span><span>פרופיל</span></a>
    </div>
  </nav>

  <div class="page">
    <div class="shifts-wrapper">
      <h2 class="page-title">ניהול המשמרות שלי</h2>

      <div class="acc-section">
        <button class="acc-header" onclick="toggleAcc('pendingAcc', this)">
          בקשות ממתינות לאישור <span class="acc-badge" id="pendingCount">0</span> <span class="acc-icon">▼</span>
        </button>
        <div class="acc-body" id="pendingAcc" style="display: none;">
          <div id="pendingList" class="shifts-list"></div>
        </div>
      </div>

      <div class="acc-section">
        <button class="acc-header active" onclick="toggleAcc('upcomingAcc', this)">
          משמרות קרובות <span class="acc-badge" id="upcomingCount">0</span> <span class="acc-icon">▲</span>
        </button>
        <div class="acc-body" id="upcomingAcc" style="display: block;">
          <div id="upcomingList" class="shifts-list">
            <div class="empty-state">⏳ טוען נתונים...</div>
          </div>
        </div>
      </div>

      <div class="acc-section">
        <button class="acc-header" onclick="toggleAcc('completedAcc', this)">
          היסטוריית משמרות <span class="acc-badge" id="completedCount">0</span> <span class="acc-icon">▼</span>
        </button>
        <div class="acc-body" id="completedAcc" style="display: none;">
          <div id="completedList" class="shifts-list"></div>
        </div>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/upcoming-shifts.js"></script>
</body>
</html>
