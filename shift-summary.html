<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>סיכום משמרת – babysitter</title>
  <link rel="stylesheet" href="style/common.css">
  <link rel="stylesheet" href="style/shift-summary.css">
</head>
<body>

  <nav class="navbar">
    <a class="logo" href="index.html">🍼 babysitter</a>
    <div class="nav-links">
      <a class="nav-link" href="index.html">🏠 בית</a>
      <a class="nav-link" href="family-search.html">🔍 חיפוש</a>
      <a class="nav-link" href="upcoming-shifts.html">📅 המשמרות שלי</a>
      <a class="nav-link" href="active-shift.html">⏱️ משמרת פעילה</a>
      <a class="nav-link active" href="shift-summary.html">💳 סיכום משמרת</a>
    </div>
    <div class="nav-right">
      <a class="nav-icon" href="register.html"><span>👤</span><span>פרופיל</span></a>
    </div>
  </nav>

  <div class="page">
    <div class="summary-card">
      
      <div class="card-header">
        <button class="back-btn" onclick="window.location.href='index.html'">×</button>
        <div class="card-title">סיכום משמרת</div>
      </div>

      <div class="card-body">
        
        <div class="col-left">
          <div class="sitter-row">
            <img id="sitterImgSumm" src="images/default-avatar.png" alt="Sitter" class="sitter-avatar">
            <div>
              <div class="sitter-sub">הבייביסיטר שלך</div>
              <div id="sitterNameSumm" class="sitter-name">--</div>
            </div>
          </div>

          <div class="details-box">
            <div class="details-title">פרטי המשמרת</div>
            <div class="detail-row">
              <span class="detail-lbl">תאריך:</span>
              <span id="shiftDateSumm">--/--/----</span>
            </div>
            <div class="detail-row">
              <span class="detail-lbl">שעת התחלה:</span>
              <span id="shiftStartSumm">--:--</span>
            </div>
            <div class="detail-row">
              <span class="detail-lbl">שעת סיום:</span>
              <span id="shiftEndSumm">--:--</span>
            </div>
            <div class="detail-row">
              <span class="detail-lbl">סה"כ זמן:</span>
              <span id="shiftDurationSumm">-- שעות ו--- דקות</span>
            </div>
            <div class="detail-row">
              <span class="detail-lbl">תעריף שעתי:</span>
              <span id="shiftRateSumm">₪--/שעה</span>
            </div>
          </div>
        </div>

        <div class="col-right">
          <div class="total-box">
            <div class="total-label">סך הכל לתשלום</div>
            <div id="shiftTotalSumm" class="total-amount">₪0</div>
          </div>

          <div class="pay-title">איך תרצי לשלם?</div>
          <div class="pay-btns">
            <button class="pay-btn" onclick="payAndFinish('bit')">תשלום ב-Bit</button>
            <button class="pay-btn" onclick="payAndFinish('cash')">שולם במזומן</button>
            <button class="pay-btn" style="background: #e091b0; color: white; margin-top: 10px;" onclick="goToRating()">
              סיום ומעבר לדירוג ⭐
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/shift-summary.js"></script>
</body>
</html>
