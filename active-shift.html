<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>משמרת פעילה – babysitter</title>
<link rel="icon" href="images/favicon.svg">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="style/common.css">
<link rel="stylesheet" href="style/active-shift.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a class="logo" href="index.html">🍼 babysitter</a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">🏠 בית</a>
    <a class="nav-link " href="family-search.html">🔍 חיפוש</a>
    <a class="nav-link " href="upcoming-shifts.html">📅 המשמרות שלי</a>
    <a class="nav-link active" href="active-shift.html">⏱️ משמרת פעילה</a>
    <a class="nav-link " href="shift-summary.html">💳 סיכום משמרת</a>
  </div>
  <div class="nav-right">
    <a class="nav-icon" href="profile.html"><span>👤</span><span>פרופיל</span></a>
  </div>
</nav>

<!-- LAYOUT -->
<div class="layout">

  <!-- PANEL (right) -->
  <aside class="panel">

    <div class="panel-title">משמרת פעילה</div>

    <!-- Timer -->
    <div class="timer" id="timerDisplay">2:15:29</div>

    <div class="divider"></div>

    <!-- Battery -->
    <div class="battery-row">
      <div class="battery-label">סוללה:</div>
      <div class="battery-bar-wrap">
        <span class="battery-icon">🔋</span>
        <div class="battery-track">
          <div class="battery-fill" id="batteryFill"></div>
        </div>
        <span class="battery-pct" id="batteryPct">75%</span>
      </div>
    </div>

    <!-- Tracking -->
    <div class="tracking-badge">
      <div class="tracking-dot"></div>
      מעקב פעיל
    </div>

    <div class="divider"></div>

    <!-- Buttons -->
    <button class="btn-contact" onclick="showToast('📞 מתקשר לבייביסיטר...')">
      📞 התקשרי
    </button>

    <button class="btn-end" onclick="endShift()">
      סיום משמרת
    </button>

  </aside>

  <!-- MAP -->
  <div class="map-area">
    <div id="map"></div>
  </div>

</div>

<!-- End-shift confirmation modal -->
<div class="modal-overlay" id="endModal">
  <div class="modal-box">
    <div class="modal-title">לסיים את המשמרת?</div>
    <div class="modal-text">המשמרת תיסגר ותעברו למסך הסיכום והתשלום.</div>
    <div class="modal-actions">
      <button class="modal-btn modal-cancel" onclick="closeModal()">ביטול</button>
      <button class="modal-btn modal-confirm" onclick="confirmEnd()">כן, סיום</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="js/active-shift.js"></script>
</body>
</html>
