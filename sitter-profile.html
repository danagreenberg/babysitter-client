<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>פרופיל בייביסיטר – babysitter</title>
  
  <link rel="stylesheet" href="style/common.css">
  <link rel="stylesheet" href="style/sitter-profile.css">
</head>
<body>

<nav class="navbar">
    <a class="logo" href="index.html">🍼 babysitter</a>
    <div class="nav-links">
      <a class="nav-link" href="index.html">🏠 בית</a>
      <a class="nav-link only-family" href="family-search.html">🔍 חיפוש בייביסיטר</a>
      <a class="nav-link only-sitter" href="my-requests.html">🔔 הבקשות שלי</a>
      <a class="nav-link" href="upcoming-shifts.html">📅 ניהול משמרת</a>
    </div>
    <div class="nav-right nav-actions">
      <a class="nav-icon" href="profile.html"><span>👤</span><span>פרופיל</span></a>
      <a class="nav-icon logout-link" href="index.html" onclick="logoutUser()"><span>🚪</span><span>התנתקות</span></a>
    </div>
  </nav>

  <div class="page">
    <div class="profile-wrapper">
      
      <div class="profile-grid">
        <div class="profile-info">
          <h1 id="profName" class="prof-name">--</h1>
          
          <div class="prof-details">
            <div>גיל: <span id="profAge">--</span></div>
            <div>תעריף לשעה: ₪<span id="profRate">--</span></div>
            <div>ניסיון: <span id="profExp">--</span> שנים</div>
            <div id="profileLoader" style="display: none; justify-content: center; padding: 40px; font-size: 24px;">
              ⏳ טוען נתונים...
            </div>
            <div id="profDistance" style="display: none; background: #fff0f6; color: #8a3050; padding: 10px 15px; border-radius: 12px; margin-top: 15px; font-size: 15px; text-align: center;">
  </div>
          </div>
          
          <div id="profVerified" class="verified-badge" style="display: none;">Verified ✔</div>
          
          <h2 class="reviews-title">ביקורות:</h2>
          
          <div id="profReviews" class="reviews-container">
            <div style="text-align: center; color: #888; width: 100%;">טוען ביקורות...</div>
          </div>
        </div>

        <div class="profile-action">
          <img id="profImg" src="images/default-avatar.png" alt="תמונת בייביסיטר" class="prof-img">
          
          <button class="btn-action btn-book" onclick="bookSitter()">שלח בקשת הזמנה</button>
          <button class="btn-action btn-call" onclick="callSitter()">מעבר לשיחת טלפון</button>
        </div>
      </div>

    </div>
  </div>

  <div class="modal-overlay" id="bookingModal">
    <div class="modal-box">
      <div class="modal-title">בקשת הזמנה מ<span id="modalSitterName">הבייביסיטר</span></div>
      <div class="modal-text">בחרי תאריך ושעות למשמרת המבוקשת:</div>
      
      <div class="form-group">
        <label>תאריך:</label>
        <input type="date" id="bookDate" class="fi">
      </div>
      <div class="form-group" style="display: flex; gap: 10px;">
        <div style="flex: 1;">
          <label>שעת התחלה:</label>
          <input type="time" id="bookStartTime" class="fi">
        </div>
        <div style="flex: 1;">
          <label>שעת סיום:</label>
          <input type="time" id="bookEndTime" class="fi">
        </div>
      </div>

      <div class="modal-actions">
        <button class="modal-btn modal-cancel" onclick="closeBookingModal()">ביטול</button>
        <button class="modal-btn modal-confirm" onclick="submitBookingRequest()">שלח בקשה</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/sitter-profile.js"></script>
</body>
</html>

  <div class="toast" id="toast"></div>

  <script src="js/sitter-profile.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
