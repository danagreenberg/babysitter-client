<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>הרשמה למערכת – babysitter</title>
  <link rel="stylesheet" href="style/register.css">
</head>
<body>

  <div class="register-wrapper">
    <div class="register-card">
      
      <div class="brand-logo">🍼 babysitter</div>
      <h1 class="register-title">יצירת חשבון חדש</h1>
      <p class="register-subtitle">הצטרפי לקהילת הבייביסיטרים והמשפחות שלנו</p>

      <form id="registerForm" enctype="multipart/form-data">
        
        <div class="role-selector">
          <label class="role-option">
            <input type="radio" name="userRole" value="family" checked onchange="toggleRoleFields()">
            <span class="role-btn">משפחה 👨‍👩‍👧‍👦</span>
          </label>
          <label class="role-option">
            <input type="radio" name="userRole" value="sitter" onchange="toggleRoleFields()">
            <span class="role-btn">בייביסיטר 🍼</span>
          </label>
        </div>

        <div class="form-group">
          <input class="fi" type="text" id="registerName" placeholder="שם מלא">
        </div>

        <div class="form-group">
          <input class="fi" type="email" id="registerEmail" placeholder="כתובת אימייל">
          <div id="emailError" class="error-msg">כתובת אימייל לא תקינה</div>
        </div>

        <div class="form-group">
          <input class="fi" type="password" id="registerPass" placeholder="בחרי סיסמה">
        </div>

        <div class="flex-row">
          <input class="fi" type="tel" id="registerPhone" placeholder="מספר טלפון">
          <input class="fi" type="text" id="registerAddress" placeholder="כתובת מגורים">
        </div>

        <div class="form-group" id="familyFields">
          <div class="counter-wrap">
            <span class="counter-label">מספר ילדים:</span>
            <div class="counter-controls">
              <button type="button" class="cbtn cbtn-minus" onclick="changeCount(-1)">−</button>
              <span class="cnum" id="childCount">1</span>
              <button type="button" class="cbtn cbtn-plus" onclick="changeCount(1)">+</button>
            </div>
          </div>
        </div>

        <div id="sitterFields" class="hidden-fields">
          <input class="fi" type="number" id="registerAge" placeholder="גיל" min="14" max="99">
          <input class="fi" type="number" id="registerRate" placeholder="תעריף (₪)" min="10" max="300">
          <input class="fi" type="number" id="registerExp" placeholder="שנות ניסיון" min="0" max="50">
        </div>

        <div class="form-group margin-top-20">
          <label class="custom-file-upload">
            <input type="file" id="registerImg" accept="image/*">
            <span>📷 העלאת תמונת פרופיל</span>
          </label>
          <div id="fileNameDisplay" class="file-name-indicator">לא נבחרה תמונה</div>
        </div>

        <button type="button" class="btn-submit" onclick="register()">הרשמה וסיום</button>

      </form>

      <div class="register-footer">
        כבר יש לך חשבון? <a href="login.html">התחברי כאן</a>
      </div>

    </div>
  </div>

  <div id="msgModal" class="modal-overlay">
    <div class="modal-box">
      <h3 id="modalTitle"></h3>
      <p id="modalText"></p>
      <button class="btn-submit" onclick="closeMsgModal()">הבנתי</button>
    </div>
  </div>

  <script src="js/register.js"></script>
</body>
</html>
