<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>התחברות – babysitter</title>
  <link rel="stylesheet" href="style/common.css">
  <link rel="stylesheet" href="style/login.css">
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">
      
      <div class="brand-logo">🍼 babysitter</div>
      <h1 class="login-title">ברוכה השבה!</h1>
      <p class="login-subtitle">התחברי כדי לנהל את המשמרות שלך</p>

      <form id="loginForm">
        
        <div class="form-group">
          <input class="fi" type="email" id="loginEmail" placeholder="כתובת אימייל" required>
          <div id="emailError" class="error-msg">כתובת אימייל לא תקינה</div>
        </div>

        <div class="form-group">
          <input class="fi" type="password" id="loginPass" placeholder="סיסמה" required>
        </div>

        <button type="button" onclick="login()">התחברות</button>

      </form>

      <div class="login-footer">
        עדיין אין לך חשבון? <a href="register.html">הירשמי כאן</a>
      </div>

    </div>
  </div>

  <div id="msgModal" class="modal-overlay">
    <div class="modal-box">
      <h3 id="modalTitle"></h3>
      <p id="modalText"></p>
      <button class="btn-submit" onclick="closeMsgModal()">הבנתי</button>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
