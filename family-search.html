<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חיפוש – babysitter</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="css/style.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'Heebo', Arial, sans-serif;
  direction: rtl;
  color: #333;
  overflow: hidden;
}

#wrapper {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ── NAVBAR ── */
.navbar {
  background: white;
  border-bottom: 1px solid #f0e8ed;
  padding: 0 28px;
  height: 62px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 1px 8px rgba(180,80,130,0.08);
  gap: 16px;
  position: relative;
  z-index: 1000;
}

.logo {
  font-size: 22px; font-weight: 900; color: #c4557a;
  display: flex; align-items: center; gap: 8px;
  text-decoration: none; flex-shrink: 0;
}

.nav-links {
  display: flex; gap: 4px; align-items: center;
  position: absolute; left: 50%; transform: translateX(-50%);
}

.nav-link {
  font-size: 13px; font-weight: 600; color: #aaa;
  text-decoration: none; padding: 7px 13px;
  border-radius: 10px; transition: all 0.18s; white-space: nowrap;
}
.nav-link:hover { color: #c4557a; background: #fde8f2; }
.nav-link.active { color: #c4557a; background: #fde8f2; font-weight: 700; }

.nav-right {
  display: flex; gap: 14px; align-items: center; flex-shrink: 0;
}
.nav-icon {
  display: flex; flex-direction: column; align-items: center;
  gap: 2px; color: #aaa; font-size: 11px; font-weight: 600;
  text-decoration: none; transition: color 0.2s;
}
.nav-icon span:first-child { font-size: 20px; }
.nav-icon:hover { color: #c4557a; }

/* Search filters row */
.filters-bar {
  background: white;
  border-bottom: 1px solid #f0e8ed;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.fi-search {
  display: flex; align-items: center; gap: 8px;
  background: #fdf0f7; border: 1.5px solid #f0dde8;
  border-radius: 10px; padding: 8px 14px; flex: 1; max-width: 260px;
}
.fi-search input {
  border: none; outline: none; background: transparent;
  font-family: inherit; font-size: 14px; color: #444;
  text-align: right; width: 100%;
}
.fi-search input::placeholder { color: #cbb4c4; }

.fi-select-wrap { position: relative; }
.fi-select {
  background: #fdf0f7; border: 1.5px solid #f0dde8;
  border-radius: 10px; padding: 8px 30px 8px 14px;
  font-size: 13px; font-family: inherit; color: #888;
  font-weight: 600; appearance: none; outline: none; cursor: pointer;
}
.fi-select:focus { border-color: #e8b4ca; }
.fi-arrow { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: #ccc; pointer-events: none; }

/* ── MAIN LAYOUT ── */
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0; /* critical for flex children with overflow */
}

/* ── SIDEBAR ── */
.sidebar {
  width: 300px;
  min-width: 280px;
  background: #fdf8fb;
  border-left: 1px solid #f0e8ed;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
  min-height: 0;
}

.sidebar-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid #f5edf2;
  font-size: 15px; font-weight: 700; color: #333;
  display: flex; justify-content: space-between; align-items: center;
}
.results-count { font-size: 12px; color: #bbb; font-weight: 500; }

.cards-list {
  flex: 1; overflow-y: auto;
  padding: 12px; display: flex; flex-direction: column; gap: 10px;
}
.cards-list::-webkit-scrollbar { width: 3px; }
.cards-list::-webkit-scrollbar-thumb { background: #f0c8da; border-radius: 2px; }

/* Sitter card */
.sc {
  background: white; border: 1.5px solid #f5edf2;
  border-radius: 14px; display: flex; overflow: hidden;
  cursor: pointer; transition: all 0.2s;
  box-shadow: 0 1px 6px rgba(180,80,130,0.06);
}
.sc:hover { border-color: #e8b4ca; box-shadow: 0 3px 14px rgba(180,80,130,0.12); transform: translateY(-1px); }
.sc.sel { border-color: #c4557a; background: #fff8fb; }

.sc-img { width: 85px; min-width: 85px; object-fit: cover; object-position: top; background: #f5e0ea; display: block; }
.sc-info { flex: 1; padding: 11px 12px; display: flex; flex-direction: column; gap: 3px; }
.sc-name { font-size: 15px; font-weight: 800; color: #222; }
.sc-meta { font-size: 12px; color: #aaa; line-height: 1.5; }
.sc-stars { color: #ffb300; font-size: 12px; }
.sc-rate { font-size: 13px; font-weight: 700; color: #c4557a; }

/* ── MAP ── */
.map-area { flex: 1; position: relative; min-width: 0; }
#map { position: absolute; inset: 0; }

/* Pins */
.lpin {
  background: #d4789e;
  color: white;
  border-radius: 20px 20px 20px 4px;
  padding: 6px 11px 6px 6px;
  font-size: 13px; font-weight: 700;
  white-space: nowrap;
  box-shadow: 0 3px 10px rgba(180,80,130,0.4);
  display: inline-flex; align-items: center; gap: 7px;
  font-family: 'Heebo', Arial, sans-serif;
  cursor: pointer; overflow: hidden;
  border: 2px solid rgba(255,255,255,0.35);
  transition: all 0.15s;
}
.lpin:hover { background: #c4557a; transform: scale(1.05); }
.lpin.sel { background: #5a2040; }
.lpin img { width: 26px; height: 26px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.85); object-fit: cover; flex-shrink: 0; }

/* Toast */
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: #3a1f30; color: white; padding: 10px 24px;
  border-radius: 20px; font-size: 14px; font-weight: 600;
  z-index: 9999; display: none; font-family: inherit;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2); white-space: nowrap;
}
</style>
</head>
<body>

<!-- NAVBAR -->
<div id="wrapper">

<nav class="navbar">
  <a class="logo" href="family-search.html" onclick="return true;">🍼 babysitter</a>
  <div class="nav-links">
    <a class="nav-link active" href="family-search.html">🔍 חיפוש</a>
    <a class="nav-link " href="active-shift.html">⏱️ משמרת פעילה</a>
    <a class="nav-link " href="shift-summary.html">💳 סיכום משמרת</a>
    <a class="nav-link " href="register.html">📝 הרשמה</a>
  </div>
  <div class="nav-right">
    <a class="nav-icon" href="#"><span>💬</span><span>הודעות</span></a>
    <a class="nav-icon" href="register.html"><span>👤</span><span>פרופיל</span></a>
  </div>
</nav>

<!-- FILTERS BAR -->
<div class="filters-bar">
  <div class="fi-search">
    <span style="color:#ccc;font-size:15px;">🔍</span>
    <input type="text" id="searchInput" placeholder="חפש לפי שם, שכונה..." oninput="refresh()">
  </div>
  <div class="fi-select-wrap">
    <select class="fi-select" onchange="refresh()">
      <option>תאריך</option>
      <option>היום</option><option>מחר</option><option>הסוף שבוע</option>
    </select>
    <span class="fi-arrow">▼</span>
  </div>
  <div class="fi-select-wrap">
    <select class="fi-select" id="priceFilter" onchange="refresh()">
      <option value="all">מחיר</option>
      <option value="55">עד ₪55</option>
      <option value="65">עד ₪65</option>
      <option value="999">הכול</option>
    </select>
    <span class="fi-arrow">▼</span>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR (right) -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span>בייביסיטרים בסביבה</span>
      <span class="results-count" id="countEl"></span>
    </div>
    <div class="cards-list" id="cardsList"></div>
  </aside>

  <!-- MAP (left) -->
  <div class="map-area">
    <div id="map"></div>
  </div>

</div>

</div><!-- /wrapper -->

<div class="toast" id="toast"></div>
<script src="family-search.js"></script>
</body>
</html>
