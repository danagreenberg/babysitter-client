<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חיפוש – babysitter</title>
<link rel="icon" href="images/favicon.svg">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="style/common.css">
<link rel="stylesheet" href="style/family-search.css">
</head>
<body>

<!-- NAVBAR -->
<div id="wrapper">

<nav class="navbar">
  <a class="logo" href="index.html">🍼 babysitter</a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">🏠 בית</a>
    <a class="nav-link active" href="family-search.html">🔍 חיפוש</a>
    <a class="nav-link " href="active-shift.html">⏱️ משמרת פעילה</a>
    <a class="nav-link " href="shift-summary.html">💳 סיכום משמרת</a>
    <a class="nav-link " href="register.html">📝 הרשמה</a>
  </div>
  <div class="nav-right">
    <a class="nav-icon" href="register.html"><span>👤</span><span>פרופיל</span></a>
  </div>
</nav>

<!-- FILTERS BAR -->
<div class="filters-bar">
  <div class="fi-search">
    <span class="search-ico">🔍</span>
    <input type="text" id="searchInput" placeholder="חפש לפי שם, שכונה..." oninput="refresh()">
  </div>
  <div class="fi-select-wrap">
    <select class="fi-select" onchange="refresh()">
      <option>תאריך</option>
      <option>היום</option><option>מחר</option><option>הסוף שבוע</option>
    </select>
    <span class="fi-arrow">▼</span>
  </div>
  <div class="fi-select-wrap">
    <select class="fi-select" id="priceFilter" onchange="refresh()">
      <option value="all">מחיר</option>
      <option value="55">עד ₪55</option>
      <option value="65">עד ₪65</option>
      <option value="999">הכול</option>
    </select>
    <span class="fi-arrow">▼</span>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR (right) -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span>בייביסיטרים בסביבה</span>
      <span class="results-count" id="countEl"></span>
    </div>
    <div class="cards-list" id="cardsList"></div>
  </aside>

  <!-- MAP (left) -->
  <div class="map-area">
    <div id="map"></div>
  </div>

</div>

</div><!-- /wrapper -->

<div class="toast" id="toast"></div>
<script src="js/family-search.js"></script>
</body>
</html>
